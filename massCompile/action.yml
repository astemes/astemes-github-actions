name: 'Close LabVIEW'
description: 'Closes the LabVIEW application'

inputs:
  path:
    description: 'Directory to mass comile'
    required: true
  fail_workflow:
    description: 'Fail workflow if CLI returns non-zero exit code'
    required: false
    default: 'true'
runs:
  using: "composite"
  steps:
    - run: |
        LabVIEWCLI `
          -OperationName MassCompile `
          -DirectoryToCompile "${{ github.workspace }}\${{ inputs.path }}" `
          -LabVIEWPath "$env:LabVIEWPath" `
          -PortNumber "$env:LabVIEWPort" `
          -LogToConsole true `
          -Verbosity Minimal `
          -Headless

        if ($LASTEXITCODE -ne 0) {
          if ("${{ inputs.fail_workflow }}" -eq "true") {
            Write-Error "Mass compile failed with exit code $LASTEXITCODE"
            exit 1
          } else {
            Write-Warning "Mass compile failed with exit code $LASTEXITCODE, but continuing."
            exit 0
          }
        }
      shell: powershell